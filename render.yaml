services:
  - type: web
    name: daily-life-tracker
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm build
    startCommand: pnpm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 24.14.0
      - key: TZ
        value: Asia/Jerusalem
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: daily-life-tracker-db
          property: connectionString

databases:
  - name: daily-life-tracker-db
    databaseName: daily_life_tracker
    user: daily_life_tracker
    plan: free
    region: frankfurt
    ipAllowList: []
